# .almanac/topics.yaml — source of truth for topic metadata.
# Managed by `almanac topics` commands. User-added comments
# between entries will be stripped on the next write (js-yaml
# doesn't round-trip comments). Edit at your own risk — or use the
# CLI (`almanac topics create|link|describe|rename|delete`)
# which preserves the structure correctly.
topics:
  - slug: ai
    title: Ai
    description: Model catalog, routing, streaming, tools, and media generation.
    parents:
      - backend
  - slug: auth
    title: Auth
    description: WorkOS, session cookies, bearer tokens, and service auth.
    parents:
      - backend
  - slug: automations
    title: Automations
    description: Scheduled or user-triggered AI workflows.
    parents:
      - backend
  - slug: backend
    title: Backend
    description: Next API routes, Convex modules, and server-only helpers.
    parents: []
  - slug: billing
    title: Billing
    description: Stripe, plans, usage, budgets, top-ups, and entitlements.
    parents:
      - backend
  - slug: clients
    title: Clients
    description: First-party desktop, mobile, and extension clients.
    parents:
      - systems
  - slug: data
    title: Data
    description: Convex records, shared DTOs, knowledge, memory, and persistence.
    parents:
      - backend
  - slug: design
    title: Design
    description: Visual language, shared theme tokens, and component constraints.
    parents:
      - frontend
  - slug: execution
    title: Execution
    description: Browser tasks, Daytona sandboxes, and local/native agents.
    parents:
      - backend
  - slug: flows
    title: Flows
    description: Cross-file, end-to-end processes.
    parents: []
  - slug: frontend
    title: Frontend
    description: Web UI, app shell, and rendered client behavior.
    parents: []
  - slug: integrations
    title: Integrations
    description: Composio, MCP servers, and connected app tooling.
    parents:
      - backend
  - slug: operations
    title: Operations
    description: Deploy, release, monitoring, environment, and runtime constraints.
    parents:
      - backend
  - slug: stack
    title: Stack
    description: Third-party frameworks, runtimes, and external services.
    parents: []
  - slug: storage
    title: Storage
    description: Durable object storage, upload/download URLs, and quotas.
    parents:
      - backend
  - slug: systems
    title: Systems
    description: Custom Overlay systems and domain modules.
    parents: []
