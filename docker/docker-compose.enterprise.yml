# @enterprise-future — not wired to production
# Base Docker Compose stack for on-prem Overlay deployments.
# Generated by create-overlay-app; safe to modify.

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: overlay
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: overlay
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U overlay"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - miniodata:/data
    ports:
      - "9000:9000"
      - "9001:9001"

  meilisearch:
    image: getmeili/meilisearch:latest
    environment:
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY}
    volumes:
      - meilisearchdata:/meili_data
    ports:
      - "7700:7700"

  overlay-web:
    build:
      context: ../
      dockerfile: docker/Dockerfile.enterprise
    ports:
      - "3000:3000"
    env_file:
      - ../.env.local
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_started
      meilisearch:
        condition: service_started

volumes:
  pgdata:
  redisdata:
  miniodata:
  meilisearchdata:
