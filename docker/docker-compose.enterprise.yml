# Base Docker Compose stack for on-prem Overlay deployments.

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: overlay
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: overlay
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U overlay"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - miniodata:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9000/minio/health/live >/dev/null || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET_NAME: ${MINIO_BUCKET_NAME:-overlay}
    entrypoint: ["/bin/sh", "-c"]
    command:
      - >
        mc alias set local http://minio:9000 "$$MINIO_ROOT_USER" "$$MINIO_ROOT_PASSWORD" &&
        mc mb --ignore-existing "local/$$MINIO_BUCKET_NAME" &&
        mc anonymous set none "local/$$MINIO_BUCKET_NAME"

  keycloak:
    image: quay.io/keycloak/keycloak:latest
    command: start-dev --import-realm
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/overlay
      KC_DB_USERNAME: overlay
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD}
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KC_HOSTNAME: localhost
      KC_HTTP_ENABLED: "true"
    volumes:
      - ./keycloak/overlay-realm.json:/opt/keycloak/data/import/overlay-realm.json:ro
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollamadata:/root/.ollama
    ports:
      - "11434:11434"
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 20

  meilisearch:
    image: getmeili/meilisearch:latest
    profiles: ["search"]
    environment:
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY}
    volumes:
      - meilisearchdata:/meili_data
    ports:
      - "7700:7700"

  migrate:
    build:
      context: ../
      dockerfile: docker/Dockerfile.enterprise
    env_file:
      - path: ../.env.enterprise.example
      - path: ../.env.enterprise
        required: false
    command: ["node", "--experimental-strip-types", "scripts/db-migrate.ts"]
    depends_on:
      postgres:
        condition: service_healthy

  seed:
    build:
      context: ../
      dockerfile: docker/Dockerfile.enterprise
    env_file:
      - path: ../.env.enterprise.example
      - path: ../.env.enterprise
        required: false
    command: ["node", "--experimental-strip-types", "scripts/db-seed.ts"]
    depends_on:
      migrate:
        condition: service_completed_successfully

  overlay-web:
    build:
      context: ../
      dockerfile: docker/Dockerfile.enterprise
    ports:
      - "3000:3000"
    env_file:
      - path: ../.env.enterprise.example
      - path: ../.env.enterprise
        required: false
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      keycloak:
        condition: service_started
      ollama:
        condition: service_healthy
      seed:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health/dependencies >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20

volumes:
  pgdata:
  redisdata:
  miniodata:
  meilisearchdata:
  ollamadata:
