name: Security Checks

on:
  pull_request:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  public-env-guard:
    name: Guard Public Env Names
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Fail on public secret-like env vars
        shell: bash
        run: |
          set -euo pipefail
          allowlist='NEXT_PUBLIC_(SENTRY_DSN|CONVEX_URL|APP_URL|POSTHOG_TOKEN|POSTHOG_HOST)'
          matches="$(
            {
              git grep -nE 'NEXT_PUBLIC_[A-Z0-9_]*(SECRET|TOKEN|KEY|PASSWORD)' -- \
                . \
                ':(exclude).env.example' \
                ':(exclude)README.md' \
                ':(exclude)ENV_SETUP.md' \
                ':(exclude)TESTING_CHECKLIST.md' \
                ':(exclude)docs/**' \
                || true
            } | grep -vE "$allowlist" \
              || true
          )"

          if [ -n "$matches" ]; then
            echo "Forbidden public env variable names found:"
            echo "$matches"
            exit 1
          fi

          echo "No forbidden NEXT_PUBLIC_* secret-like variables found."

  dependency-review:
    name: Dependency Review
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: read
      security-events: read
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Detect dependency graph availability
        id: dependency-graph
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const response = await github.rest.repos.get({
              owner,
              repo,
            });
            const status = response.data.security_and_analysis?.dependency_graph?.status || 'disabled';
            core.setOutput('enabled', String(status === 'enabled'));

      - name: Check dependency changes
        if: steps.dependency-graph.outputs.enabled == 'true'
        uses: actions/dependency-review-action@v4

      - name: Skip dependency review when dependency graph is disabled
        if: steps.dependency-graph.outputs.enabled != 'true'
        run: echo "Skipping dependency review because GitHub dependency graph is disabled for this repository."

  dependency-audit:
    name: Lockfile, Typecheck, and Audit
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Ensure package lock exists
        run: test -f package-lock.json

      - name: Install from lockfile
        run: npm ci --ignore-scripts

      - name: Verify lockfile is in sync
        run: |
          npm install --package-lock-only --ignore-scripts
          git diff --exit-code package-lock.json package.json

      - name: Typecheck
        run: npm run typecheck

      - name: Audit production dependencies
        run: npm run security:audit
