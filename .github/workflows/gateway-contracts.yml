name: Gateway Contracts

on:
  pull_request:
    paths:
      - '.github/workflows/gateway-contracts.yml'
      - 'package.json'
      - 'package-lock.json'
      - 'scripts/vercel-ai-gateway-canary.ts'
      - 'src/server/ai/gateway/**'
      - 'src/server/app-api/v1/conversations/act/**'
      - 'src/server/tools/**'
      - 'src/shared/security/safe-log.ts'
  push:
    branches:
      - main
      - master
    paths:
      - '.github/workflows/gateway-contracts.yml'
      - 'package.json'
      - 'package-lock.json'
      - 'scripts/vercel-ai-gateway-canary.ts'
      - 'src/server/ai/gateway/**'
      - 'src/server/app-api/v1/conversations/act/**'
      - 'src/server/tools/**'
      - 'src/shared/security/safe-log.ts'
  deployment_status:
  workflow_dispatch:
    inputs:
      run_paid_gateway_canary:
        description: 'Run the paid Vercel AI Gateway canary. Cost is preflight-capped to <= $0.01 by default.'
        required: false
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  contracts:
    name: Schema and Routing Contracts
    if: github.event_name != 'deployment_status'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run Gateway contracts
        run: npm run test:gateway-contracts

  paid-gateway-canary:
    name: Paid Gateway Canary
    if: >-
      (github.event_name == 'deployment_status' &&
        github.event.deployment_status.state == 'success' &&
        (github.event.deployment.environment == 'Production' || github.event.deployment.environment == 'production')) ||
      (github.event_name == 'workflow_dispatch' && inputs.run_paid_gateway_canary)
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.deployment.sha || github.sha }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Check Gateway secret
        id: gateway-secret
        shell: bash
        env:
          AI_GATEWAY_API_KEY: ${{ secrets.AI_GATEWAY_API_KEY }}
        run: |
          if [ -n "$AI_GATEWAY_API_KEY" ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "AI_GATEWAY_API_KEY secret is not configured; skipping paid canary."
          fi

      - name: Run paid Gateway canary
        if: steps.gateway-secret.outputs.present == 'true'
        env:
          AI_GATEWAY_API_KEY: ${{ secrets.AI_GATEWAY_API_KEY }}
          AI_GATEWAY_CANARY_CONFIRM_SPEND: '1'
          AI_GATEWAY_CANARY_MAX_COST_USD: '0.01'
          AI_GATEWAY_CANARY_MODEL: 'google/gemini-3-flash'
          AI_GATEWAY_CANARY_INPUT_TOKEN_BUDGET: '512'
          AI_GATEWAY_CANARY_OUTPUT_TOKEN_BUDGET: '8'
        run: npm run test:gateway-canary
